version: "3.9"

services:

  server:
    build: .
    environment:
      APP_MODE: server
      SERVER_PORT: "5000"
    ports:
      - "5001:5000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  client:
    build: .
    environment:
      APP_MODE: client
      SERVER_HOST: server
      SERVER_PORT: "5000"
    depends_on:
      server:
        condition: service_healthy
